version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || true
        - node -v
        - npm ci
    build:
      commands:
        # Next.js SSR (WEB_COMPUTE) — API routes require Amplify Hosting compute
        - "env | grep -E '^(RESEND_|BOOKING_)' | sed 's/=.*/=***/' || echo 'WARN: booking env vars not visible at build time'"
        - npm run build
  artifacts:
    # Critical for Next.js SSR + /api routes on Amplify Hosting compute
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
