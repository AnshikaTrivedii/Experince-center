version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Amplify Gen 1 makes console env vars available at BUILD time,
        # but does NOT automatically forward them to the SSR compute runtime.
        # Write them to .env.production so Next.js loads them at server startup.
        - "echo RESEND_API_KEY=$RESEND_API_KEY >> .env.production"
        - "echo BOOKING_TO_EMAIL=$BOOKING_TO_EMAIL >> .env.production"
        - "echo BOOKING_FROM_EMAIL=$BOOKING_FROM_EMAIL >> .env.production"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
